<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Treino do XD</title>
    <style>
        :root[data-theme="dark"] {
            --bg: #0f0f0f;
            --card: #1a1a1a;
            --card2: #222;
            --text: #f0f0f0;
            --muted: #888;
            --accent: #7c3aed;
            --accent2: #a78bfa;
            --done-bg: #14532d22;
            --done-border: #22c55e44;
            --done-text: #86efac;
            --bar-bg: #2a2a2a;
            --border: #2a2a2a;
            --btn: #7c3aed;
            --btn-hover: #6d28d9;
            --badge: #1e1e2e;
        }

        :root[data-theme="light"] {
            --bg: #f5f5f5;
            --card: #ffffff;
            --card2: #f0f0f0;
            --text: #111;
            --muted: #666;
            --accent: #7c3aed;
            --accent2: #6d28d9;
            --done-bg: #f0fdf4;
            --done-border: #86efac;
            --done-text: #15803d;
            --bar-bg: #e5e7eb;
            --border: #e5e7eb;
            --btn: #7c3aed;
            --btn-hover: #6d28d9;
            --badge: #ede9fe;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            transition: background 0.3s, color 0.3s;
        }

        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--card);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .header-left h1 {
            font-size: 1.3rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .header-left p {
            font-size: 0.75rem;
            color: var(--muted);
            margin-top: 2px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .theme-btn {
            background: var(--card2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 6px 10px;
            cursor: pointer;
            font-size: 1rem;
            color: var(--text);
            transition: background 0.2s;
        }

        .theme-btn:hover {
            background: var(--border);
        }

        .global-reset {
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 6px 12px;
            cursor: pointer;
            font-size: 0.75rem;
            color: var(--muted);
            transition: all 0.2s;
        }

        .global-reset:hover {
            border-color: #ef4444;
            color: #ef4444;
        }

        nav {
            display: flex;
            gap: 8px;
            padding: 16px 24px;
            overflow-x: auto;
            scrollbar-width: none;
        }

        nav::-webkit-scrollbar {
            display: none;
        }

        nav a {
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 999px;
            font-size: 0.8rem;
            font-weight: 600;
            white-space: nowrap;
            background: var(--card2);
            color: var(--muted);
            border: 1px solid var(--border);
            transition: all 0.2s;
        }

        nav a:hover {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        nav a.done-nav {
            background: var(--done-bg);
            border-color: var(--done-border);
            color: var(--done-text);
        }

        main {
            max-width: 760px;
            margin: 0 auto;
            padding: 24px 16px 80px;
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        .day-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            transition: border-color 0.3s;
        }

        .day-card.completed {
            border-color: var(--done-border);
        }

        .day-header {
            padding: 20px 24px 16px;
            border-bottom: 1px solid var(--border);
        }

        .day-header-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 14px;
        }

        .day-label {
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--accent2);
            margin-bottom: 4px;
        }

        .day-title {
            font-size: 1.4rem;
            font-weight: 800;
        }

        .day-subtitle {
            font-size: 0.8rem;
            color: var(--muted);
            margin-top: 2px;
        }

        .day-badge {
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 0.7rem;
            font-weight: 700;
            background: var(--badge);
            color: var(--accent2);
            white-space: nowrap;
            flex-shrink: 0;
        }

        .day-badge.done-badge {
            background: var(--done-bg);
            color: var(--done-text);
            border: 1px solid var(--done-border);
        }

        .progress-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .progress-bar {
            flex: 1;
            height: 6px;
            border-radius: 999px;
            background: var(--bar-bg);
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            border-radius: 999px;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            transition: width 0.4s ease;
        }

        .progress-text {
            font-size: 0.72rem;
            color: var(--muted);
            min-width: 36px;
            text-align: right;
        }

        .muscle-group {
            padding: 0 24px;
        }

        .muscle-label {
            padding: 14px 0 8px;
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--muted);
            border-bottom: 1px solid var(--border);
            margin-bottom: 4px;
        }

        .exercise-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
            transition: opacity 0.2s;
            cursor: pointer;
        }

        .exercise-item:last-child {
            border-bottom: none;
        }

        .exercise-item.checked .exercise-name {
            text-decoration: line-through;
            color: var(--muted);
        }

        .exercise-item.checked {
            background: var(--done-bg);
            margin: 0 -24px;
            padding-left: 24px;
            padding-right: 24px;
            border-radius: 8px;
        }

        .exercise-item.checked .exercise-sets {
            color: var(--done-text);
        }

        .exercise-emoji {
            font-size: 1.2rem;
            flex-shrink: 0;
            width: 28px;
            text-align: center;
        }

        .exercise-info {
            flex: 1;
            min-width: 0;
        }

        .exercise-name {
            font-size: 0.9rem;
            font-weight: 600;
            transition: color 0.2s, text-decoration 0.2s;
        }

        .exercise-tip {
            font-size: 0.72rem;
            color: var(--muted);
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .exercise-sets {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--accent2);
            white-space: nowrap;
            flex-shrink: 0;
        }

        .custom-check {
            width: 20px;
            height: 20px;
            border-radius: 6px;
            border: 2px solid var(--border);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            background: transparent;
        }

        .exercise-item.checked .custom-check {
            background: #22c55e;
            border-color: #22c55e;
        }

        .custom-check svg {
            display: none;
            width: 12px;
            height: 12px;
        }

        .exercise-item.checked .custom-check svg {
            display: block;
        }

        .day-footer {
            padding: 16px 24px 20px;
            border-top: 1px solid var(--border);
        }

        .conclude-btn {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: var(--btn);
            color: white;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.3px;
        }

        .conclude-btn:hover:not(:disabled) {
            background: var(--btn-hover);
            transform: translateY(-1px);
        }

        .conclude-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .conclude-btn.done-btn {
            background: #15803d;
            cursor: default;
        }

        .conclude-btn.done-btn:hover {
            background: #15803d;
            transform: none;
        }

        .undo-btn {
            display: block;
            margin: 8px auto 0;
            background: transparent;
            border: none;
            font-size: 0.72rem;
            color: var(--muted);
            cursor: pointer;
            text-decoration: underline;
            transition: color 0.2s;
        }

        .undo-btn:hover {
            color: #ef4444;
        }

        .rest-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px 24px;
            text-align: center;
        }

        .rest-card .rest-emoji {
            font-size: 2.
